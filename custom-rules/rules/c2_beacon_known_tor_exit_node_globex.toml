[metadata]
creation_date = "2026/06/11"
maturity = "production"
updated_date = "2026/06/11"

[rule]
author = ["Scott Holt"]
description = """
Detects outbound C2 beacon communication to known Tor exit node 185.220.101.42 from GLOBEX endpoints. This rule
triggers the Sumo Logic cross-platform investigation workflow.
"""
from = "now-9m"
index = ["logs-*"]
language = "kuery"
license = "Elastic License v2"
name = "C2 Beacon to Known Tor Exit Node — GLOBEX"
risk_score = 95
rule_id = "059a3f8d-ae0a-4219-a5da-a17f7e1e71b0"
severity = "critical"
tags = ["C2", "Exfiltration", "Sumo Logic Enrichment", "GLOBEX Demo"]
timestamp_override = "event.ingested"
type = "query"

query = '''
event.action: "c2_beacon" AND destination.ip: "185.220.101.42"
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1071"
name = "Application Layer Protocol"
reference = "https://attack.mitre.org/techniques/T1071/"

[rule.threat.tactic]
id = "TA0011"
name = "Command and Control"
reference = "https://attack.mitre.org/tactics/TA0011/"

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1041"
name = "Exfiltration Over C2 Channel"
reference = "https://attack.mitre.org/techniques/T1041/"

[rule.threat.tactic]
id = "TA0010"
name = "Exfiltration"
reference = "https://attack.mitre.org/tactics/TA0010/"
