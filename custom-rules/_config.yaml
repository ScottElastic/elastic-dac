bbr_rules_dirs:
- rules_building_block
directories:
  action_connector_dir: action_connectors
  action_dir: actions
  exception_dir: exceptions
files:
  deprecated_rules: etc/deprecated_rules.json
  packages: etc/packages.yaml
  stack_schema_map: etc/stack-schema-map.yaml
  version_lock: etc/version.lock.json
rule_dirs:
- rules
testing:
  config: etc/test_config.yaml

# --- DaC recommended settings (dac-reference E2E example) ---
# Manage versioning via Kibana revision/version instead of the repo lock file
bypass_version_lock: True
# Normalize KQL keywords to lowercase on import/export for consistent diffs
normalize_kql_keywords: True
# Auto-generate schemas for custom/non-ECS fields encountered during validation
auto_gen_schema_file: "etc/schemas/auto_gen.json"
# Skip Elastic-internal optional field validation (license, investigation guides, etc.)
bypass_optional_elastic_validation: True
